# Docker Image Push to GHCR (spec W141-156)
#
# Triggered on tag push v*. Builds multi-stage OCaml image and pushes
# to ghcr.io/clanclanclanclan/latex_perf.

name: Docker Push

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/clanclanclanclan/latex_perf:${{ github.ref_name }}
            ghcr.io/clanclanclanclan/latex_perf:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
