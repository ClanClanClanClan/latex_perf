name: Proof CI (Coq)

on:
  push:
  pull_request:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  # ── Phase 1: Sharded proof compilation (8 parallel jobs) ──────────
  # Spec W86-91: "proof-farm scale to 128 jobs; total time < 9 min"
  # CI uses 8 shards (GitHub Actions); k8s scales to 32-128 via
  # infra/k8s/proof-farm-job.yaml.
  proof-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
      max-parallel: 8
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ocaml-env
        with:
          opam-packages: dune coq=8.18.0 coq-core=8.18.0 coq-mathcomp-ssreflect=1.17.0
          extra-repos: coq-released=https://coq.inria.fr/opam/released
          system-packages: libgmp-dev pkg-config

      - name: Build proofs (shard ${{ matrix.shard }}/8)
        id: build
        run: |
          START=$(date +%s%N)
          bash scripts/infra/proof_farm/proof_shard.sh ${{ matrix.shard }} 8
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "shard_time_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"
          echo "Shard ${{ matrix.shard }} compilation: ${ELAPSED_MS}ms"

  # ── Phase 2: Verification (runs after all shards complete) ────────
  proof-ci:
    needs: proof-shard
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ocaml-env
        with:
          opam-packages: dune coq=8.18.0 coq-core=8.18.0 coq-mathcomp-ssreflect=1.17.0
          extra-repos: coq-released=https://coq.inria.fr/opam/released
          system-packages: libgmp-dev pkg-config

      - name: Check _CoqProject exists
        run: |
          if [ ! -f "_CoqProject" ]; then
            echo "_CoqProject file missing"; exit 1; fi

      - name: Full proof build (verification)
        id: build
        run: |
          START=$(date +%s%N)
          opam exec -- dune build proofs -j 4
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - START) / 1000000 ))
          echo "proof_time_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"
          echo "Proof compilation: ${ELAPSED_MS}ms"

      - name: Enforce zero admits and zero axioms
        run: |
          echo "=== Zero-Admit Policy ==="
          ADMITS=$(grep -rcE '^\s*(Admitted\.|admit\.)' --include="*.v" --exclude-dir=archive --exclude='*.disabled' proofs/ || echo "0")
          AXIOMS=$(grep -rcE '^\s*(Axiom|Parameter)\b' --include="*.v" --exclude-dir=archive --exclude='*.disabled' proofs/ || echo "0")
          echo "Admits found: $ADMITS"
          echo "Axioms found: $AXIOMS"
          if grep -rE '^\s*(Admitted\.|admit\.)' --include="*.v" --exclude-dir=archive --exclude='*.disabled' proofs/; then
            echo "[proof-gate] ERROR: admits found"; exit 1; fi
          if grep -rE '^\s*(Axiom|Parameter)\b' --include="*.v" --exclude-dir=archive --exclude='*.disabled' proofs/; then
            echo "[proof-gate] ERROR: axioms found"; exit 1; fi
          echo "✅ Zero admits, zero axioms"

      - name: Proof timing summary
        if: always()
        run: |
          echo "=== Proof Timing Summary ==="
          echo "Total proof compilation: ${{ steps.build.outputs.proof_time_ms }}ms"
          V_FILES=$(find proofs -name '*.v' -not -path '*/archive/*' | wc -l)
          THEOREMS=$(grep -rcE '^(Theorem|Lemma) ' proofs/*.v proofs/ML/*.v 2>/dev/null | awk -F: '{s+=$2} END{print s}')
          echo "Proof files: $V_FILES"
          echo "Theorems+Lemmas: $THEOREMS"
          echo ""
          echo "Target: < 9 min total CI time (proof compilation: ${{ steps.build.outputs.proof_time_ms }}ms)"

      # ── Regression alerts (only on failure) ─────────────────────────
      - name: Open issue for proof regression
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Proof regression: ${context.ref} @ ${context.sha.substring(0,7)}`;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Proof CI failed.\n\n- Branch: ${context.ref}\n- SHA: ${context.sha}\n- Run: ${url}\n\nPlease inspect the failing proof and fix admits/regressions.`;
            const res = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['proof-regression']
            });
            core.notice(`Opened issue #${res.data.number}`);

      - name: Slack notify (proof regression)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            TXT="🚨 Proof regression in $GITHUB_REPOSITORY on ${GITHUB_REF} @ ${GITHUB_SHA:0:7}\nRun: ${URL}"
            curl -s -X POST -H 'Content-type: application/json' --data "{\"text\": \"${TXT}\"}" "$SLACK_WEBHOOK_URL" || true
          else
            echo "[proof-alert] SLACK_WEBHOOK_URL not set; skipping Slack notification"
          fi

      - name: Email notify (proof regression)
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Proof regression: ${{ github.repository }} ${{ github.ref }} @ ${{ github.sha }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Proof CI failed.
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref }}
            SHA: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
