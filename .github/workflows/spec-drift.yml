# Spec Drift Gate (v26 WS0)
#
# Ensures no public document disagrees with governance/project_facts.yaml.
# Runs check_repo_facts.py on every push and PR.

name: Spec Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - name: Check project facts consistency
        run: python3 scripts/tools/check_repo_facts.py --facts governance/project_facts.yaml --repo .

      - name: Check rule contracts drift (PR #241 p1.3)
        # Runtime-vs-contract binding: every Class C id in
        # execution_class.ml has execution_class=C in rule_contracts.yaml.
        # JSON mirror matches YAML. Every spec id has a contract. Acyclic.
        run: python3 scripts/tools/check_rule_contracts.py --repo .

      - name: Check catalogue compliance
        run: python3 scripts/validate_catalogue.py

      - name: Check regression gates (PR #241 p1.6, extended p1.9)
        # Ratchets that prevent previously-closed issues from reopening:
        # 1. _CoqProject lists every non-archive proof file
        # 2. Rule IDs in rule_contracts.yaml match FAMILY-NNN
        # 3. (p1.9) Runtime-emitted IDs must appear in rule_contracts
        # 4. (p1.9) No lowercase rule IDs in validator sources
        # 5. Mutation-uncovered count does not grow (skipped here; run
        #    in unit-tests workflow where mutation binary is built)
        run: python3 scripts/tools/check_regression_gates.py --skip-mutation

      - name: Check memo file-list presence (PR #245 p1.9)
        # Every memo §16.1 + §16.2 "Files to create" bullet must resolve
        # to a repo path (directly or via documented alias). Would have
        # caught round-7 gaps (DependencyInvalidation.v, log_context.ml)
        # before merge.
        run: python3 scripts/tools/check_memo_files.py --repo .

      - name: Check docstring theorem counts (PR #245 p1.9)
        # P1.8 found docs/PROOFS.md + PROOF_GUIDE.md said 1,157 theorems
        # but governance said 1,181. Extended check_repo_facts covers
        # this now.
        run: python3 scripts/tools/check_repo_facts.py --facts governance/project_facts.yaml --repo .

      - name: Meta-gate: every gate script is runnable
        # P1.8 found check_regression_gates had a typo'd binary name.
        # This gate verifies every gate-script itself runs without
        # tracebacks or empty output.
        run: python3 scripts/tools/check_gates_meta.py --repo .

      - name: Severity drift (PR #245 p1.10)
        # Every rule's default_severity in rules_v3.yaml must match the
        # severity = ... literal in the OCaml rule body. Catches the
        # case where someone edits one without the other.
        run: python3 scripts/tools/check_severity_drift.py --repo .

      - name: MLI docstring coverage (PR #245 p1.10, ratchet)
        # Ratchets the count of undocumented exported vals. Blocks new
        # undocumented vals; existing ones can be added progressively.
        run: python3 scripts/tools/check_mli_doc_coverage.py --repo .

      - name: Code quality (PR #245 p1.10)
        # Three sub-gates: no [Defined.] in load-bearing proofs, no
        # silent wildcard-exception swallows in non-test OCaml, no
        # trivially-passing test assertions.
        run: python3 scripts/tools/check_code_quality.py --repo .

      - name: Unused hypotheses in proofs (PR #245 p1.10)
        # Flag proof bodies whose [intros] discards ≥2 hypotheses via
        # bare `_`. Would have caught the round-5 RepairMonotonicity
        # regression where 3 boundary hypotheses were ignored.
        run: python3 scripts/tools/check_unused_hypotheses.py --repo .

      - name: Check support matrix yaml parses
        run: |
          python3 - <<'PY'
          import yaml, sys
          from pathlib import Path
          p = Path("docs/SUPPORT_MATRIX.yaml")
          if not p.is_file():
              print("FAIL: missing", p, file=sys.stderr); sys.exit(1)
          data = yaml.safe_load(p.read_text())
          for section in ("engines", "document_modes", "macro_support",
                          "proof_classes", "interfaces", "execution_classes"):
              if section not in data:
                  print(f"FAIL: missing section {section}", file=sys.stderr); sys.exit(1)
          print(f"[support_matrix] PASS: v{data['version']} with {len(data)} sections")
          PY
