name: Unicode Rules Smoke

on:
  push:
  pull_request:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  unicode-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      L0_VALIDATORS: pilot
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ocaml-env
        with:
          system-packages: jq curl

      - name: Build service and REST
        run: |
          opam exec -- dune build latex-parse/src/main_service.exe latex-parse/src/rest_api_server.exe

      - name: Run service and REST
        run: |
          rm -f /tmp/l0_lex_svc.sock || true
          opam exec -- env L0_VALIDATORS=pilot L0_ALLOW_SCALAR=1 L0_POOL_CORES=0,1 L0_MINOR_HEAP_MB=4 L0_NO_MLOCK=1 \
            ./_build/default/latex-parse/src/main_service.exe &
          sleep 2
          opam exec -- env L0_VALIDATORS=pilot ./_build/default/latex-parse/src/rest_api_server.exe -p 8080 &
          sleep 0.5

      - name: Unicode smokes
        run: |
          bash scripts/smoke_rules_unicode.sh http://127.0.0.1:8080/expand

      - name: Teardown
        if: always()
        run: |
          pkill -f rest_api_server || true
          pkill -f main_service || true
