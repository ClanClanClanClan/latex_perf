name: Validators Pilot Smoke (CLI)

on:
  push:
  pull_request:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true


jobs:
  smoke-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ocaml-env

      - name: Build CLI
        run: |
          opam exec -- dune build latex-parse/src/validators_cli.exe

      - name: Run CLI pilot smoke
        env:
          L0_VALIDATORS: pilot
        run: |
          bash scripts/smoke_rules_pilot_cli.sh

      - name: Install python deps for gates
        run: pip install pyyaml

      - name: Producer coverage + correctness gate
        run: python3 scripts/tools/check_producer_coverage.py

      - name: Apply-fixes convergence safety
        run: python3 scripts/tools/check_apply_fixes_safety.py --repo .

      - name: Verbatim safety
        run: python3 scripts/tools/check_verbatim_safety.py --repo .
