# Proof-Farm Kubernetes Job Template (spec W18)
#
# Deploys 32 parallel Coq compilation workers. Each worker compiles
# a shard of the proof files (round-robin assignment by JOB_COMPLETION_INDEX).
#
# Usage:
#   kubectl apply -f proof-farm-job.yaml
#
# Prerequisites:
#   - Kubernetes cluster with 32+ available pods
#   - PVC "proof-sources" containing the repository checkout
#   - Container image with Coq 8.18.0 + OCaml 5.1.1

apiVersion: batch/v1
kind: Job
metadata:
  name: proof-farm
  labels:
    app: latex-perfectionist
    component: proof-farm
    version: v25
spec:
  parallelism: 32
  completions: 32
  completionMode: Indexed
  backoffLimit: 3
  activeDeadlineSeconds: 1800  # 30 min total timeout
  template:
    metadata:
      labels:
        app: latex-perfectionist
        component: proof-worker
    spec:
      restartPolicy: Never
      containers:
        - name: coq-worker
          image: coqorg/coq:8.18.0
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              SHARD_INDEX=${JOB_COMPLETION_INDEX}
              TOTAL_SHARDS=32
              echo "[proof-farm] Worker ${SHARD_INDEX}/${TOTAL_SHARDS} starting"

              cd /work
              # Run the shard script
              bash scripts/infra/proof_farm/proof_shard.sh \
                ${SHARD_INDEX} ${TOTAL_SHARDS}

              echo "[proof-farm] Worker ${SHARD_INDEX} complete"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
            - name: proof-sources
              mountPath: /work
              readOnly: false
          env:
            - name: OPAMROOT
              value: /root/.opam
            - name: DUNE_CACHE
              value: enabled
      volumes:
        - name: proof-sources
          persistentVolumeClaim:
            claimName: proof-sources
