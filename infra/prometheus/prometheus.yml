# Prometheus scrape configuration (spec W23-25)
# Targets the LaTeX Perfectionist metrics endpoint on port 9109.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "latex-perfectionist"
    static_configs:
      - targets: ["localhost:9109"]
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: "proof-farm"
    static_configs:
      - targets: ["localhost:9109"]
    metrics_path: /metrics
    scrape_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "proof-farm"
