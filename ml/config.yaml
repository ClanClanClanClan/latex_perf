# ML Span Extractor — Master Configuration
# All hyperparameters, paths, and seeds live here for reproducibility.

seed: 42

paths:
  vpd_patterns: "../specs/rules/vpd_patterns.json"
  golden_yaml: "../specs/rules/pilot_v1_golden.yaml"
  corpus_dirs:
    - "../corpora/lint/pilot_v1"
    - "../corpora/lint/locale"
    - "../corpora/lint/stragglers2"
    - "../corpora/lint/l2_approx"
    - "../corpora/lint/l2_batch3"
    - "../corpora/lint/l2_batch4"
    - "../corpora/lint/l3_text_approx"
    - "../corpora/lint/l5_expl3_tikz"
    - "../corpora/l1"
  # Legacy single-dir key (backward compat)
  corpus_dir: "../corpora/lint/pilot_v1"
  labeled_jsonl: "data/labeled_spans.jsonl"
  train_jsonl: "data/train.jsonl"
  dev_jsonl: "data/dev.jsonl"
  eval_results: "eval_results.json"

labeling:
  # Maximum document length (chars) for BIO tagging
  max_doc_length: 500000
  # Context window for feature extraction (chars)
  context_window: 5

split:
  train_ratio: 0.80
  dev_ratio: 0.20
  stratify_by_rule: true

baseline_logreg:
  C: 1.0
  max_iter: 1000
  solver: "lbfgs"
  ngram_range: [1, 3]

baseline_gbt:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8

bert_crf:
  model_name: "allenai/scibert_scivocab_uncased"
  max_length: 128       # Docs are 30-200 chars; 512 wastes compute
  batch_size: 8         # Smaller batch = more gradient updates per epoch
  epochs: 50            # Time is not an issue; early stopping will cut if converged
  learning_rate: 3.0e-5 # Slightly higher for faster convergence on small data
  warmup_ratio: 0.1
  weight_decay: 0.01
  crf_learning_rate: 1.0e-3
  patience: 7           # Early stopping patience (only after epoch 15)
  min_epochs: 15        # Don't early-stop before this

evaluation:
  f1_threshold: 0.94
  metric: "span_f1"  # span-level, not token-level
