# Golden corpus entries for L2-approximable rules (FIG, TAB, PKG, CJK)
---
  - file: corpora/lint/l2_approx/fig_001.tex
    expect: ["FIG-001"]
    expect_msgs:
      - "FIG-001:Figure without caption"
  - file: corpora/lint/l2_approx/fig_002.tex
    expect: ["FIG-002"]
    expect_msgs:
      - "FIG-002:Figure without label"
  - file: corpora/lint/l2_approx/fig_003.tex
    expect: ["FIG-003"]
    expect_msgs:
      - "FIG-003:Label before caption in figure"
  - file: corpora/lint/l2_approx/fig_007.tex
    expect: ["FIG-007"]
    expect_msgs:
      - "FIG-007:Figure lacks alt text for accessibility"
  - file: corpora/lint/l2_approx/fig_009.tex
    expect: ["FIG-009"]
    expect_msgs:
      - "FIG-009:Float position specifier ! used excessively"
  - file: corpora/lint/l2_approx/tab_001.tex
    expect: ["TAB-001"]
    expect_msgs:
      - "TAB-001:Table lacks caption"
  - file: corpora/lint/l2_approx/tab_002.tex
    expect: ["TAB-002"]
    expect_msgs:
      - "TAB-002:Caption below table (journal requires above)"
  - file: corpora/lint/l2_approx/tab_005.tex
    expect: ["TAB-005"]
    expect_msgs:
      - "TAB-005:Vertical rules present in tabular"
  - file: corpora/lint/l2_approx/pkg_001.tex
    expect: ["PKG-001"]
    expect_msgs:
      - "PKG-001:Package duplicate inclusion detected"
  - file: corpora/lint/l2_approx/pkg_002.tex
    expect: ["PKG-002"]
    expect_msgs:
      - "PKG-002:geometry loaded after hyperref – must precede"
  - file: corpora/lint/l2_approx/pkg_004.tex
    expect: ["PKG-004"]
    expect_msgs:
      - "PKG-004:Package loaded after \begin{document}"
  - file: corpora/lint/l2_approx/pkg_005.tex
    expect: ["PKG-005"]
    expect_msgs:
      - "PKG-005:Unknown option for geometry"
  - file: corpora/lint/l2_approx/cjk_004.tex
    expect: ["CJK-004"]
    expect_msgs:
      - "CJK-004:xeCJK package missing when CJK glyphs present"
  - file: corpora/lint/l2_approx/cjk_006.tex
    expect: ["CJK-006"]
    expect_msgs:
      - "CJK-006:Ruby annotation requires ruby package"
  - file: corpora/lint/l2_approx/font_006.tex
    expect: ["FONT-006"]
    expect_msgs:
      - "FONT-006:Missing \microtypesetup{expansion=true}"
  - file: corpora/lint/l2_approx/font_007.tex
    expect: ["FONT-007"]
    expect_msgs:
      - "FONT-007:Obsolete \usepackage[T1]{fontenc} under XeLaTeX"
  - file: corpora/lint/l2_approx/font_008.tex
    expect: ["FONT-008"]
    expect_msgs:
      - "FONT-008:Multiple \setmainfont declarations"
  - file: corpora/lint/l2_approx/math_032.tex
    expect: ["MATH-032"]
    expect_msgs:
      - "MATH-032:Incorrect small matrix brackets"
  - file: corpora/lint/l2_approx/math_054.tex
    expect: ["MATH-054"]
    expect_msgs:
      - "MATH-054:Equation labelled 'eq:' without environment"
  - file: corpora/lint/l2_approx/math_062.tex
    expect: ["MATH-062"]
    expect_msgs:
      - "MATH-062:Multiline equation lacks alignment character &"
  - file: corpora/lint/l2_approx/math_063.tex
    expect: ["MATH-063"]
    expect_msgs:
      - "MATH-063:Equation array with > 1 alignment point"
  - file: corpora/lint/l2_approx/math_100.tex
    expect: ["MATH-100"]
    expect_msgs:
      - "MATH-100:Punctuation after equation missing (comma/period)"
  - file: corpora/lint/l2_approx/math_023.tex
    expect: ["MATH-023"]
    expect_msgs:
      - "MATH-023:Equation label missing although referenced"
  - file: corpora/lint/l2_approx/math_024.tex
    expect: ["MATH-024"]
    expect_msgs:
      - "MATH-024:Equation labelled but never referenced"
  - file: corpora/lint/l2_approx/ref_010.tex
    expect: ["REF-010"]
    expect_msgs:
      - "REF-010:Figure referenced before first mention in text"
