    expect: ["FONT-009"]
    expect_msgs:
      - "FONT-009:Small-caps with non-ASCII chars — fallback may be visible"
  - file: corpora/lint/phase3/FONT-010_textsc_digits.tex
    expect: ["FONT-010"]
    expect_msgs:
