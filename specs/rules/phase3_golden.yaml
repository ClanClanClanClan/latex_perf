    expect: ["DOC-005"]
    expect_msgs:
      - "DOC-005:\\keywords present but absent from PDF/XMP metadata"
  - file: corpora/lint/phase3/FONT-002_mixed_sizes.tex
    expect: ["FONT-002"]
    expect_msgs:
      - "FONT-002:Mixed optical sizes in paragraph"
  - file: corpora/lint/phase3/FONT-003_protrusion_disabled.tex
    expect: ["FONT-003"]
    expect_msgs:
      - "FONT-003:Microtype protrusion disabled globally"
