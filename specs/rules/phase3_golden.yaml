cases:
  - file: corpora/lint/phase3/BIB-001_missing_doi.tex
    expect: ["BIB-001"]
    expect_msgs:
      - "BIB-001:Bibliography entry missing DOI or ISBN/ISSN"
  - file: corpora/lint/phase3/BIB-007_dup_doi.tex
    expect: ["BIB-007"]
    expect_msgs:
      - "BIB-007:Duplicate DOI appears in more than one entry"
  - file: corpora/lint/phase3/BIB-013_title_caps.tex
    expect: ["BIB-013"]
    expect_msgs:
      - "BIB-013:Title capitalisation incorrect for selected bibliography style"
  - file: corpora/lint/phase3/BIB-014_dup_author_year.tex
    expect: ["BIB-014"]
    expect_msgs:
      - "BIB-014:Duplicate author-year key without disambiguation suffix"
  - file: corpora/lint/phase3/BIB-017_title_period.tex
    expect: ["BIB-017"]
    expect_msgs:
      - "BIB-017:Bibliography title ends with punctuation mark"
  - file: corpora/lint/phase3/CHEM-010_long_reaction.tex
    expect: ["CHEM-010"]
    expect_msgs:
      - "CHEM-010:Reaction scheme line exceeds page width (> 120 chars)"
