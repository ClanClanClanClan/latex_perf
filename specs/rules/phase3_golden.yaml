    expect: ["FONT-013"]
    expect_msgs:
      - "FONT-013:Mixed proportional and tabular figures in same table"
  - file: corpora/lint/phase3/LANG-005_hyphenpenalty.tex
    expect: ["LANG-005"]
    expect_msgs:
      - "LANG-005:Hyphen-penalty too low (10 < 50)"
  - file: corpora/lint/phase3/LANG-008_spell_mismatch.tex
    expect: ["LANG-008"]
    expect_msgs:
      - "LANG-008:Spell-checker dictionary 'french' differs from babel 'english'"
  - file: corpora/lint/phase3/LANG-009_raggedright_cjk.tex
    expect: ["LANG-009"]
    expect_msgs:
      - "LANG-009:Ragged-right text in non-Latin script"
