  - file: corpora/lint/phase3/META-004_creationdate.tex
    expect: ["META-004"]
    expect_msgs:
      - "META-004:PDF /CreationDate not stripped — build not reproducible"
  - file: corpora/lint/phase3/PDF-005_no_pdfa.tex
    expect: ["PDF-005"]
    expect_msgs:
